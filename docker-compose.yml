# CORTEX — infraestructura completa y portable.
# En cualquier máquina con Docker Desktop: `docker compose up -d` levanta todo.
# Los datos de Postgres viven en el volumen `cortex_pgdata` (ver README para backup/restore).
services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cortex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cortex}
      POSTGRES_DB: ${POSTGRES_DB:-cortex}
    volumes:
      - cortex_pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cortex} -d ${POSTGRES_DB:-cortex}"]
      interval: 5s
      timeout: 3s
      retries: 12

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Dentro de la red del compose, la app habla con el servicio `postgres`.
      CORTEX_POSTGRES_DSN: postgresql+psycopg://${POSTGRES_USER:-cortex}:${POSTGRES_PASSWORD:-cortex}@postgres:5432/${POSTGRES_DB:-cortex}
      CORTEX_PIPELINE_VER: ${CORTEX_PIPELINE_VER:-0.1.0}
      CORTEX_EMBEDDING_DIM: ${CORTEX_EMBEDDING_DIM:-1024}
      CORTEX_ANTHROPIC_API_KEY: ${CORTEX_ANTHROPIC_API_KEY:-}
      CORTEX_FAST_MODEL: ${CORTEX_FAST_MODEL:-}
      CORTEX_CORE_MODEL: ${CORTEX_CORE_MODEL:-}
      CORTEX_EMBED_MODEL: ${CORTEX_EMBED_MODEL:-}
    ports:
      - "127.0.0.1:${CORTEX_API_PORT:-8000}:8000"

volumes:
  cortex_pgdata:
